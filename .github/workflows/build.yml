name: Build (Windows exe)

# PR/수동 빌드 가드: release.yml처럼 GitHub Release를 만들지는 않지만, PyInstaller
# 패키징이 매 PR마다 실제로 성공하는지 감시한다. 빌드 회귀(예: 새 의존성이 spec에
# 반영되지 않아 .exe가 깨지는 문제)를 태그를 찍기 전에 잡아내는 것이 목적이다.
# 산출물은 workflow artifact로만 업로드된다 (release 자산 아님).

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  build-windows-exe:
    name: Build Windows executable (PyInstaller)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (build extras)
        run: pip install -e ".[build]"

      - name: Build one-folder distribution (PyInstaller)
        run: pyinstaller --noconfirm pytorrent-desktop.spec

      # Headless launch proves the frozen exe actually starts (native
      # libtorrent extension loads, PySide6 platform plugin loads, styles.qss
      # is found) rather than just proving PyInstaller didn't error out.
      - name: Smoke test built exe (headless launch)
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = Start-Process -FilePath "dist\pytorrent-desktop\pytorrent-desktop.exe" -PassThru
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            Write-Error "pytorrent-desktop.exe exited within 5s (exit code $($proc.ExitCode)) — build is broken"
            exit 1
          }
          Stop-Process -Id $proc.Id -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytorrent-desktop-windows
          path: dist/pytorrent-desktop/
          retention-days: 14
