name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # PySide6 (Qt6) needs a handful of shared libraries that aren't present
      # on the headless Ubuntu runner image, even just to import the module.
      - name: Install Qt/PySide6 system libraries (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libfontconfig1 \
            libfreetype6 \
            libx11-xcb1

      - name: Install package (editable, with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

      # Headless runners can't show a PySide6 window, so this only proves the
      # native libtorrent extension loads and a session/engine can be created
      # and cleanly shut down.
      - name: Smoke test (libtorrent session + TorrentEngine)
        run: |
          python -c "import libtorrent as lt; lt.session(); from pytorrent_desktop.core.engine import TorrentEngine; TorrentEngine().shutdown()"
